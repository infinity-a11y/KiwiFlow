config:
  width: 1280
  height: 720
  title: KiwiFlow 1.0.0
  quitOnClose: true
R:
  url: "http://127.0.0.1"
  port: 3838
  kill: false
  app: "app.R"  # Point directly to app.R instead of "resources/app"
